name: CI

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "**" ]

env:
  IMAGE_NAME: library-management

jobs:
  build:
    name: Build, Test & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven build
        run: mvn -B -ntp clean compile

      - name: Run unit tests
        run: mvn -B -ntp test

      - name: Generate coverage report & enforce 75% threshold
        run: mvn -B -ntp verify -DskipTests=false

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      - name: Derive image tag
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
            echo "tag=${GITHUB_REF_NAME//\//-}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build container image
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.tag }}"
          podman build \
            --format docker \
            -t "${{ env.IMAGE_NAME }}:${IMAGE_TAG}" \
            -t "${{ env.IMAGE_NAME }}:latest" \
            -f ./Dockerfile .

      - name: Run container smoke test
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.tag }}"

          # Start container in background
          podman run -d \
            --name smoke-test \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            "${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

          # Wait up to 60 s for the app to respond
          echo "==> Waiting for application to start..."
          HEALTHY=0
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || echo "000")
            if [ "${CODE}" != "000" ] && [ "${CODE}" != "502" ] && [ "${CODE}" != "504" ]; then
              echo "==> Application is up (HTTP ${CODE}) on attempt ${i}"
              HEALTHY=1
              break
            fi
            echo "    attempt ${i}/30 — HTTP ${CODE}, retrying in 2 s..."
            sleep 2
          done

          # Dump logs always (visible in Actions UI)
          echo "==> Container logs:"
          podman logs smoke-test || true

          # Clean up
          podman rm -f smoke-test || true

          # Fail the step if the app never responded
          if [ "${HEALTHY}" -ne 1 ]; then
            echo "::error::Smoke test failed — application did not start within 60 seconds."
            exit 1
          fi
          echo "==> Smoke test passed."
