name: CI

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "**" ]

env:
  IMAGE_NAME: library-management

jobs:
  build:
    name: Build, Test & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven build
        run: mvn -B -ntp clean compile

      - name: Run unit tests
        run: mvn -B -ntp test

      - name: Generate coverage report & enforce 75% threshold
        run: mvn -B -ntp verify -DskipTests=false

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      - name: Derive image tag
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
            echo "tag=${GITHUB_REF_NAME//\//-}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build container image
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.tag }}"
          podman build \
            --format docker \
            -t "${{ env.IMAGE_NAME }}:${IMAGE_TAG}" \
            -t "${{ env.IMAGE_NAME }}:latest" \
            -f ./Dockerfile .
