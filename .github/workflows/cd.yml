name: CD

# ---------------------------------------------------------------------------
# Continuous Deployment
# Trigger:  push to main (i.e. PR merged to main) or manual dispatch
# Strategy: Build & push image to GHCR, then SSH to staging host,
#           keep previous image as :previous (rollback target),
#           replace the running container, health-check it,
#           auto-rollback on failure.
# ---------------------------------------------------------------------------

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}     # e.g. owner/library-management
  CONTAINER_NAME: library-management
  APP_PORT: 8080
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -------------------------------------------------------------------------
  # Job 1: build the production image and push it to GHCR with two tags:
  #   - <short-sha>  (immutable, used to identify this exact release)
  #   - latest       (what the staging host actually runs)
  # -------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image reference & tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          IMAGE_LOWER="${REGISTRY,,}/${IMAGE_NAME,,}"
          echo "sha_tag=${SHORT_SHA}"   >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        run: |
          IMAGE_REF="${{ steps.meta.outputs.image_ref }}"
          SHA_TAG="${{ steps.meta.outputs.sha_tag }}"
          podman build \
            --format docker \
            -t "${IMAGE_REF}:${SHA_TAG}" \
            -t "${IMAGE_REF}:latest" \
            -f ./Dockerfile .
          podman push "${IMAGE_REF}:${SHA_TAG}"
          podman push "${IMAGE_REF}:latest"

  # -------------------------------------------------------------------------
  # Job 2: deploy to the staging host over SSH.
  # Replaces the existing container; on health-check failure rolls back to
  # the image previously tagged :previous.
  # -------------------------------------------------------------------------
  deploy:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Check if deploy is configured
        id: check
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -n "${DEPLOY_HOST}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPLOY_HOST secret not set — skipping SSH deploy."
          fi

      - name: Deploy over SSH
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_REF,IMAGE_TAG,CONTAINER_NAME,APP_PORT
          script: |
            set -euo pipefail

            IMAGE_REF="${{ needs.build-and-push.outputs.image_ref }}"
            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            CONTAINER_NAME="${{ env.CONTAINER_NAME }}"
            APP_PORT="${{ env.APP_PORT }}"

            echo "==> Logging in to GHCR on host"
            echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

            # ----- 1. Preserve current :latest as :previous (rollback target) -----
            if podman image exists "${IMAGE_REF}:latest"; then
              podman tag "${IMAGE_REF}:latest" "${IMAGE_REF}:previous"
              echo "==> Old :latest re-tagged as :previous (rollback target ready)"
            else
              echo "==> No existing :latest found (first deployment)"
            fi

            # ----- 2. Pull the new image and promote it to :latest -----
            echo "==> Pulling ${IMAGE_REF}:${IMAGE_TAG}"
            podman pull "${IMAGE_REF}:${IMAGE_TAG}"
            podman tag  "${IMAGE_REF}:${IMAGE_TAG}" "${IMAGE_REF}:latest"

            # ----- 3. Replace the running container -----
            echo "==> Replacing container ${CONTAINER_NAME}"
            podman rm -f "${CONTAINER_NAME}" 2>/dev/null || true
            podman run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              -p "${APP_PORT}:8080" \
              -e SPRING_PROFILES_ACTIVE=staging \
              "${IMAGE_REF}:latest"

            # ----- 4. Health check (any HTTP response = app is up) -----
            echo "==> Waiting for app to respond on :${APP_PORT}"
            HEALTHY=0
            for i in $(seq 1 30); do
              CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:${APP_PORT}/" || echo "000")
              if [ "${CODE}" != "000" ] && [ "${CODE}" != "502" ] && [ "${CODE}" != "504" ]; then
                echo "==> Healthy on attempt ${i} (HTTP ${CODE})"
                HEALTHY=1
                break
              fi
              sleep 2
            done

            if [ "${HEALTHY}" -ne 1 ]; then
              echo "::error::Health check failed. Rolling back to :previous."
              podman logs --tail=200 "${CONTAINER_NAME}" || true
              podman rm -f "${CONTAINER_NAME}" || true
              if podman image exists "${IMAGE_REF}:previous"; then
                podman tag "${IMAGE_REF}:previous" "${IMAGE_REF}:latest"
                podman run -d \
                  --name "${CONTAINER_NAME}" \
                  --restart unless-stopped \
                  -p "${APP_PORT}:8080" \
                  -e SPRING_PROFILES_ACTIVE=staging \
                  "${IMAGE_REF}:previous"
                echo "==> Rolled back to :previous"
              else
                echo "::error::No :previous image to roll back to."
              fi
              exit 1
            fi

            # ----- 5. Cleanup dangling images -----
            podman image prune -f >/dev/null 2>&1 || true
            echo "==> Deployment complete."

      - name: Record deployment result
        if: always()
        run: |
          {
            echo "## Deployment Result"
            echo ""
            echo "- **Status:** ${{ job.status }}"
            echo "- **Image:** \`${{ needs.build-and-push.outputs.image_ref }}:${{ needs.build-and-push.outputs.image_tag }}\`"
            echo "- **Promoted to:** \`${{ needs.build-and-push.outputs.image_ref }}:latest\`"
            echo "- **Rollback tag:** \`${{ needs.build-and-push.outputs.image_ref }}:previous\`"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Actor:** ${{ github.actor }}"
            echo "- **Time (UTC):** $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } >> "$GITHUB_STEP_SUMMARY"



