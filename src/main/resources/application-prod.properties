# ---- Member Database (DB1) ----
spring.datasource.member.url=jdbc:h2:mem:memberdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.member.driver-class-name=org.h2.Driver
spring.datasource.member.username=sa
spring.datasource.member.password=

# ---- Catalog Database (DB2 — Books & Borrow Records) ----
spring.datasource.catalog.url=jdbc:h2:mem:catalogdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.catalog.driver-class-name=org.h2.Driver
spring.datasource.catalog.username=sa
spring.datasource.catalog.password=

# ---- H2 Console ----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ---- Hibernate & JPA ----
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
