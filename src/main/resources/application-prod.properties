# ---- Member Database (DB1) ----
spring.datasource.member.url=jdbc:mysql://localhost:3306/libraryDb_members?createDatabaseIfNotExist=true&useSSL=true&serverTimezone=UTC
spring.datasource.member.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.member.username=${DATABASE_USERNAME}
spring.datasource.member.password=${DATABASE_PASSWORD}

# ---- Catalog Database (DB2 — Books & Borrow Records) ----
spring.datasource.catalog.url=jdbc:mysql://localhost:3306/libraryDb_catalog?createDatabaseIfNotExist=true&useSSL=true&serverTimezone=UTC
spring.datasource.catalog.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.catalog.username=${DATABASE_USERNAME}
spring.datasource.catalog.password=${DATABASE_PASSWORD}

# ---- Hibernate & JPA ----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
